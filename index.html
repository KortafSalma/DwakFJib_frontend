<!doctype html>
<html lang="fr-MA">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#14B8A6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DWAFIJBK" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="DWAFIJBK" />
    <meta name="description" content="Moroccan Healthcare Logistics Ecosystem — Connect pharmacies, distributors, and patients in real time." />
    <title>DWAFIJBK — Moroccan Healthcare Logistics Ecosystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'dark';
        var root = document.documentElement;
        if (theme === 'dark') {
          root.classList.add('dark');
        } else {
          root.classList.add('light-mode');
        }
      })();
    </script>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; }
      body { overflow-x: hidden; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
      @media (display-mode: standalone) {
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator && !location.hostname.includes('localhost')) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('[PWA] Service Worker registered:', reg.scope);
          }).catch(function(err) {
            console.warn('[PWA] Service Worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
